<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RiFarm — Private Collection</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --void:#06060a;--deep:#0b0b10;--surf:#111118;--lift:#18181f;--lift2:#1e1e28;
  --gold:#c8a96e;--gold2:#e2c48a;--gold3:#f0d9a8;
  --gg:rgba(200,169,110,0.15);--gg2:rgba(200,169,110,0.07);
  --mu:rgba(255,255,255,0.35);--mu2:rgba(255,255,255,0.55);--mu3:rgba(255,255,255,0.08);
  --bd:rgba(200,169,110,0.12);--bd2:rgba(200,169,110,0.25);
  --red:#e05252;--green:#52c47a;
  --serif:'Cormorant Garamond',Georgia,serif;
  --ui:'Syne',system-ui,sans-serif;
}
html,body{height:100%;background:var(--void);font-family:var(--ui);color:#fff;overflow:hidden}
.app{width:100%;max-width:420px;height:100vh;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--void)}

/* ── AMBIENT ── */
.amb{position:absolute;pointer-events:none;border-radius:50%}
.a1{top:-100px;left:50%;transform:translateX(-50%);width:500px;height:400px;background:radial-gradient(ellipse,rgba(200,169,110,0.055) 0%,transparent 65%)}
.a2{bottom:80px;right:-80px;width:280px;height:280px;background:radial-gradient(circle,rgba(200,169,110,0.035) 0%,transparent 70%)}

/* ── HEADER ── */
.hdr{z-index:60;padding:14px 18px 11px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,6,10,0.96);border-bottom:0.5px solid var(--bd);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo-mk{width:33px;height:33px;border-radius:9px;background:linear-gradient(135deg,#1c1508,#261e0a);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-n{font-size:14px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2)}
.logo-s{font-size:8px;letter-spacing:.2em;color:var(--mu);text-transform:uppercase;margin-top:1px}
.hdr-r{display:flex;gap:7px}
.ib{width:33px;height:33px;border-radius:9px;background:var(--mu3);border:0.5px solid rgba(255,255,255,0.07);color:var(--mu2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.18s}
.ib:hover{background:var(--gg);color:var(--gold);border-color:var(--bd2)}
.ib.active{background:var(--gg);color:var(--gold);border-color:var(--bd2)}

/* ── NAV TABS ── */
.nav-tabs{z-index:50;display:flex;padding:0 18px;background:rgba(6,6,10,0.93);border-bottom:0.5px solid rgba(255,255,255,0.05);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.nav-tabs::-webkit-scrollbar{display:none}
.ntab{flex-shrink:0;padding:9px 11px 11px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);cursor:pointer;border:none;background:transparent;position:relative;transition:.18s;white-space:nowrap}
.ntab.on{color:var(--gold2)}
.ntab.on::after{content:'';position:absolute;bottom:0;left:11px;right:11px;height:1.5px;background:var(--gold);border-radius:1px}

/* ── PAGES ── */
.page{flex:1;overflow-y:auto;display:none;flex-direction:column;scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.on{display:flex}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.page.on{animation:fu .3s ease}

/* ── SEARCH BAR ── */
.srch-wrap{padding:14px 18px 6px}
.srch-box{display:flex;align-items:center;gap:10px;background:var(--lift);border:0.5px solid var(--bd);border-radius:12px;padding:9px 14px}
.srch-box input{flex:1;background:transparent;border:none;outline:none;font-family:var(--ui);font-size:13px;color:#fff}
.srch-box input::placeholder{color:var(--mu)}
.srch-ico{color:var(--mu);font-size:16px}

/* ── FILTER STRIP ── */
.fstrip{display:flex;gap:7px;padding:10px 18px 4px;overflow-x:auto;scrollbar-width:none}
.fstrip::-webkit-scrollbar{display:none}
.fpill{flex-shrink:0;padding:6px 13px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;cursor:pointer;border:0.5px solid var(--bd);background:var(--mu3);color:var(--mu);transition:.18s;white-space:nowrap}
.fpill.on{background:var(--gg);border-color:var(--gold);color:var(--gold2)}

/* ── SORT BAR ── */
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 4px}
.sort-count{font-size:11px;color:var(--mu)}
.sort-sel{font-size:11px;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none;font-family:var(--ui)}

/* ── PRODUCT GRID ── */
.prod-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px;padding:6px 18px 24px}

.pc{border-radius:16px;overflow:hidden;background:var(--surf);border:0.5px solid var(--bd);cursor:pointer;position:relative;transition:transform .22s,border-color .22s}
.pc:hover{transform:translateY(-3px);border-color:var(--bd2)}
.pc.featured{border-color:var(--gold)}

.pc-vis{height:150px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
.pc-vis-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,10,0.96) 0%,rgba(6,6,10,0.1) 55%,transparent 100%)}
.pc-cat{position:absolute;top:9px;left:9px;z-index:2;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border-radius:100px;background:rgba(200,169,110,0.15);border:0.5px solid var(--gold);color:var(--gold)}
.pc-feat{position:absolute;top:9px;right:9px;z-index:2;font-size:8px;font-weight:700;letter-spacing:.12em;padding:3px 7px;border-radius:100px;background:rgba(200,169,110,0.9);color:#0f0c06}
.pc-play{position:absolute;bottom:9px;right:9px;z-index:2;width:26px;height:26px;border-radius:50%;background:rgba(200,169,110,0.18);border:0.5px solid rgba(200,169,110,0.4);display:flex;align-items:center;justify-content:center;color:var(--gold2);font-size:9px}
.pc-stk-dot{position:absolute;bottom:9px;left:9px;z-index:2;width:6px;height:6px;border-radius:50%}
.in-stock{background:var(--green)}
.low-stock{background:#f0a030}
.out-stock{background:var(--red)}

.pc-body{padding:10px 11px 12px}
.pc-name{font-family:var(--serif);font-size:16px;font-weight:600;color:#fff;line-height:1.2;margin-bottom:2px}
.pc-type{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.pc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.pc-key{font-size:8px;color:var(--mu);letter-spacing:.05em}
.pc-val{font-size:8px;font-weight:700;color:var(--mu2)}
.pc-bar{height:2px;background:rgba(255,255,255,0.07);border-radius:1px;margin-bottom:4px;overflow:hidden}
.pc-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.pc-foot{margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between}
.pc-price{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--gold2)}
.pc-grade{font-size:8px;font-weight:700;letter-spacing:.1em;padding:3px 7px;border-radius:4px;background:rgba(200,169,110,0.1);color:var(--gold)}

/* ── PRODUCT DETAIL OVERLAY ── */
.det-ov{display:none;position:absolute;inset:0;z-index:200;background:var(--void);overflow-y:auto;scrollbar-width:none}
.det-ov::-webkit-scrollbar{display:none}
.det-ov.open{display:block;animation:fu .3s ease}
.det-hdr{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(6,6,10,0.95);border-bottom:0.5px solid var(--bd)}
.det-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mu2);cursor:pointer;background:none;border:none;font-family:var(--ui)}
.det-acts{display:flex;gap:7px}
.det-vis{height:260px;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;overflow:hidden}
.det-vis-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--void) 0%,transparent 60%)}
.det-play{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(200,169,110,0.9);display:flex;align-items:center;justify-content:center;font-size:22px;color:#0f0c06;cursor:pointer;transition:.2s}
.det-play:hover{transform:scale(1.07)}
.det-body{padding:22px 18px}
.det-cat-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.det-cat-badge{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:4px 10px;border-radius:100px;background:var(--gg);border:0.5px solid var(--gold);color:var(--gold)}
.det-feat-badge{font-size:9px;font-weight:700;letter-spacing:.12em;padding:4px 10px;border-radius:100px;background:var(--gold);color:#0f0c06}
.det-name{font-family:var(--serif);font-size:30px;font-weight:600;line-height:1.15;color:#fff;margin-bottom:4px}
.det-origin{font-size:11px;color:var(--mu);letter-spacing:.06em;margin-bottom:20px}
.det-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:20px}
.det-price{font-family:var(--serif);font-size:32px;font-weight:600;color:var(--gold2)}
.det-stk{font-size:11px;font-weight:700;letter-spacing:.08em}
.det-stk.in{color:var(--green)}.det-stk.low{color:#f0a030}.det-stk.out{color:var(--red)}
.det-spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.det-spec{padding:12px;background:var(--lift);border-radius:11px;border:0.5px solid var(--bd)}
.det-spec-k{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.det-spec-v{font-size:13px;font-weight:700;color:#fff}
.det-terp-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:10px}
.det-terps{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px}
.det-terp{font-size:10px;padding:5px 11px;border-radius:100px;background:var(--mu3);border:0.5px solid rgba(255,255,255,0.09);color:var(--mu2)}
.det-bar-row{margin-bottom:12px}
.det-bar-hdr{display:flex;justify-content:space-between;margin-bottom:5px}
.det-bar-k{font-size:10px;color:var(--mu)}
.det-bar-v{font-size:10px;font-weight:700;color:var(--mu2)}
.det-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.det-bar-f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.det-btn-row{display:flex;gap:10px;margin-top:6px;padding-bottom:30px}
.det-btn-p{flex:1;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#0f0c06;cursor:pointer;border:none;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.det-btn-p:hover{filter:brightness(1.07)}
.det-btn-s{width:46px;height:46px;border-radius:12px;border:0.5px solid var(--bd2);background:transparent;color:var(--gold);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s}
.det-btn-s:hover{background:var(--gg)}

/* ── ADMIN PANEL ── */
.admin-ov{display:none;position:absolute;inset:0;z-index:300;background:rgba(0,0,0,0.75);align-items:flex-end;justify-content:center}
.admin-ov.open{display:flex}
.admin-sheet{width:100%;background:var(--deep);border-radius:20px 20px 0 0;border-top:0.5px solid var(--bd2);max-height:90vh;overflow-y:auto;scrollbar-width:none}
.admin-sheet::-webkit-scrollbar{display:none}
.admin-inner{padding:18px 18px 40px}
.sheet-handle{width:32px;height:3px;background:rgba(255,255,255,0.13);border-radius:2px;margin:0 auto 18px}
.admin-title{font-family:var(--serif);font-size:22px;font-weight:600;margin-bottom:4px}
.admin-sub{font-size:11px;color:var(--mu);margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:6px;display:block}
.form-inp{width:100%;padding:11px 13px;background:var(--lift);border:0.5px solid var(--bd);border-radius:10px;font-family:var(--ui);font-size:13px;color:#fff;outline:none;transition:.18s}
.form-inp:focus{border-color:var(--gold)}
.form-inp::placeholder{color:var(--mu)}
.form-sel{width:100%;padding:11px 13px;background:var(--lift);border:0.5px solid var(--bd);border-radius:10px;font-family:var(--ui);font-size:13px;color:#fff;outline:none;cursor:pointer;appearance:none}
.form-sel option{background:var(--deep)}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;color:var(--mu2)}
.form-check input{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.admin-img-area{border:1px dashed var(--bd2);border-radius:12px;padding:22px;text-align:center;cursor:pointer;background:var(--gg2);transition:.18s;margin-bottom:14px}
.admin-img-area:hover{border-color:var(--gold);background:var(--gg)}
.admin-img-ico{font-size:26px;color:var(--gold);margin-bottom:6px}
.admin-img-lbl{font-size:12px;color:var(--mu);line-height:1.6}
.admin-divider{height:0.5px;background:rgba(255,255,255,0.06);margin:18px 0}
.admin-sec-title{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--mu);margin-bottom:12px}
.prod-admin-list{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.pal{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--lift);border-radius:11px;border:0.5px solid var(--bd)}
.pal-emoji{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.pal-info{flex:1;min-width:0}
.pal-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pal-sub{font-size:10px;color:var(--mu)}
.pal-acts{display:flex;gap:6px;flex-shrink:0}
.pal-btn{width:30px;height:30px;border-radius:8px;border:0.5px solid var(--bd);background:transparent;color:var(--mu2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s}
.pal-btn:hover{background:var(--gg);color:var(--gold);border-color:var(--bd2)}
.pal-btn.del:hover{background:rgba(224,82,82,0.12);color:var(--red);border-color:rgba(224,82,82,0.3)}
.btn-full{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#0f0c06;cursor:pointer;border:none;transition:.2s;margin-bottom:9px}
.btn-full:hover{filter:brightness(1.07)}
.btn-ghost-full{width:100%;padding:13px;border-radius:12px;background:transparent;border:0.5px solid rgba(255,255,255,0.1);font-family:var(--ui);font-size:12px;letter-spacing:.06em;color:var(--mu);cursor:pointer;transition:.18s}
.btn-ghost-full:hover{background:var(--mu3)}

/* ── STATS PAGE ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 18px 0}
.stat-card{padding:16px;background:var(--surf);border-radius:14px;border:0.5px solid var(--bd)}
.stat-lbl{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--mu);margin-bottom:6px}
.stat-val{font-family:var(--serif);font-size:26px;font-weight:600;color:#fff}
.stat-sub{font-size:10px;color:var(--green);margin-top:2px}
.chart-bar-wrap{padding:18px 18px 0}
.chart-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{font-size:11px;color:var(--mu2);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.bar-track-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.bar-num{font-size:10px;font-weight:700;color:var(--gold2);width:28px;text-align:right;flex-shrink:0}

/* ── BOTTOM NAV ── */
.bnav{z-index:60;background:rgba(6,6,10,0.97);border-top:0.5px solid var(--bd);display:flex;padding:8px 0 16px;flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px;border:none;background:transparent;transition:.18s}
.nico{font-size:20px;color:var(--mu);transition:.18s}
.nlbl{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);font-weight:500;transition:.18s}
.ni.on .nico,.ni.on .nlbl{color:var(--gold)}

/* ── TOAST ── */
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);z-index:400;background:var(--lift2);border:0.5px solid var(--bd2);padding:10px 18px;border-radius:100px;font-size:12px;color:var(--gold2);white-space:nowrap;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="amb a1"></div>
  <div class="amb a2"></div>

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="logo-mk">🌿</div>
      <div>
        <div class="logo-n">RiFarm</div>
        <div class="logo-s">Private Collection</div>
      </div>
    </div>
    <div class="hdr-r">
      <button class="ib" onclick="toggleAdmin()" id="admin-btn" aria-label="Admin"><i class="ti ti-settings"></i></button>
      <button class="ib" aria-label="Notifications"><i class="ti ti-bell"></i></button>
    </div>
  </div>

  <!-- TABS -->
  <div class="nav-tabs">
    <button class="ntab on" data-t="catalogue">Catalogue</button>
    <button class="ntab" data-t="stats">Analytics</button>
    <button class="ntab" data-t="featured">Vedettes</button>
  </div>

  <!-- ===== CATALOGUE PAGE ===== -->
  <div class="page on" id="p-catalogue">
    <div class="srch-wrap">
      <div class="srch-box">
        <i class="ti ti-search srch-ico"></i>
        <input type="text" id="search-inp" placeholder="Rechercher une variété…" oninput="renderGrid()">
        <i class="ti ti-adjustments-horizontal srch-ico" style="cursor:pointer" onclick="cycleSort()"></i>
      </div>
    </div>
    <div class="fstrip" id="filter-strip"></div>
    <div class="sort-bar">
      <span class="sort-count" id="sort-count">0 variétés</span>
      <button class="sort-sel" onclick="cycleSort()"><i class="ti ti-arrows-sort" style="font-size:13px"></i> <span id="sort-lbl">Vedettes</span></button>
    </div>
    <div class="prod-grid" id="prod-grid"></div>
  </div>

  <!-- ===== STATS PAGE ===== -->
  <div class="page" id="p-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-bar-wrap">
      <div class="chart-title">Vues par catégorie</div>
      <div id="chart-bars"></div>
    </div>
    <div style="height:24px"></div>
  </div>

  <!-- ===== FEATURED PAGE ===== -->
  <div class="page" id="p-featured">
    <div class="prod-grid" id="feat-grid" style="padding-top:14px"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <button class="ni on" data-n="catalogue"><i class="ti ti-layout-grid nico"></i><span class="nlbl">Catalogue</span></button>
    <button class="ni" data-n="stats"><i class="ti ti-chart-bar nico"></i><span class="nlbl">Stats</span></button>
    <button class="ni" data-n="featured"><i class="ti ti-star nico"></i><span class="nlbl">Vedettes</span></button>
  </div>

  <!-- PRODUCT DETAIL OVERLAY -->
  <div class="det-ov" id="det-ov">
    <div class="det-hdr">
      <button class="det-back" onclick="closeDetail()"><i class="ti ti-arrow-left" style="font-size:16px"></i> Retour</button>
      <div class="det-acts">
        <button class="ib" onclick="toggleFeatured()" id="det-feat-btn" aria-label="Featured"><i class="ti ti-star"></i></button>
        <button class="ib" onclick="openEditFromDetail()" aria-label="Edit"><i class="ti ti-edit"></i></button>
      </div>
    </div>
    <div class="det-vis" id="det-vis">
      <div class="det-vis-ov"></div>
      <div class="det-play"><i class="ti ti-player-play" style="font-size:22px;margin-left:3px"></i></div>
    </div>
    <div class="det-body">
      <div class="det-cat-row">
        <span class="det-cat-badge" id="det-cat-badge">—</span>
        <span class="det-feat-badge" id="det-feat-badge" style="display:none">✦ VEDETTE</span>
      </div>
      <div class="det-name" id="det-name">—</div>
      <div class="det-origin" id="det-origin">—</div>
      <div class="det-price-row">
        <span class="det-price" id="det-price">—</span>
        <span class="det-stk" id="det-stk-lbl">—</span>
      </div>
      <div class="det-spec-grid" id="det-spec-grid"></div>
      <div class="det-terp-title">Terpènes & Arômes</div>
      <div class="det-terps" id="det-terps"></div>
      <div id="det-bars"></div>
      <div class="det-btn-row">
        <button class="det-btn-p"><i class="ti ti-shopping-cart" style="font-size:15px"></i> Commander</button>
        <button class="det-btn-s" aria-label="Partager"><i class="ti ti-share"></i></button>
        <button class="det-btn-s" aria-label="Sauvegarder"><i class="ti ti-bookmark"></i></button>
      </div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-ov" id="admin-ov" onclick="adminBgClick(event)">
    <div class="admin-sheet">
      <div class="admin-inner">
        <div class="sheet-handle"></div>
        <div class="admin-title" id="admin-form-title">Ajouter un produit</div>
        <div class="admin-sub">Remplissez les informations de la variété</div>

        <div class="admin-img-area" onclick="toast('Upload image — intégrer avec Cloudinary')">
          <div class="admin-img-ico"><i class="ti ti-photo-up"></i></div>
          <div class="admin-img-lbl">Photo / Vidéo du produit<br><span style="font-size:10px;color:var(--mu)">JPG · PNG · MP4 · MOV</span></div>
        </div>

        <div class="form-row">
          <label class="form-lbl">Nom de la variété</label>
          <input class="form-inp" id="f-name" placeholder="ex. Banana OG">
        </div>
        <div class="form-2">
          <div class="form-row">
            <label class="form-lbl">Catégorie</label>
            <select class="form-sel" id="f-cat">
              <option value="Dry Sift">Dry Sift</option>
              <option value="Frozen Sift">Frozen Sift</option>
              <option value="Static">Static</option>
              <option value="Beldia">Beldia</option>
              <option value="Premium Edition">Premium Ed.</option>
            </select>
          </div>
          <div class="form-row">
            <label class="form-lbl">Grade</label>
            <select class="form-sel" id="f-grade">
              <option>ORIGIN</option>
              <option>GOLD</option>
              <option>ELITE</option>
              <option>PLATINUM</option>
              <option>DIAMOND</option>
            </select>
          </div>
        </div>
        <div class="form-2">
          <div class="form-row">
            <label class="form-lbl">Prix (MAD/g)</label>
            <input class="form-inp" id="f-price" type="number" placeholder="120">
          </div>
          <div class="form-row">
            <label class="form-lbl">Stock</label>
            <select class="form-sel" id="f-stock">
              <option value="in">En stock</option>
              <option value="low">Stock faible</option>
              <option value="out">Rupture</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-lbl">Texture</label>
          <input class="form-inp" id="f-texture" placeholder="ex. Fine Sable, Cristalline…">
        </div>
        <div class="form-row">
          <label class="form-lbl">Couleur</label>
          <input class="form-inp" id="f-color" placeholder="ex. Miel doré, Ambre…">
        </div>
        <div class="form-row">
          <label class="form-lbl">Origine / Terroir</label>
          <input class="form-inp" id="f-origin" placeholder="ex. Rif Oriental, Ketama…">
        </div>
        <div class="form-row">
          <label class="form-lbl">Terpènes (séparés par virgule)</label>
          <input class="form-inp" id="f-terps" placeholder="Pin, Agrumes, Boisé…">
        </div>
        <div class="form-2">
          <div class="form-row">
            <label class="form-lbl">Pureté %</label>
            <input class="form-inp" id="f-purity" type="number" placeholder="88" min="0" max="100">
          </div>
          <div class="form-row">
            <label class="form-lbl">Arôme %</label>
            <input class="form-inp" id="f-arome" type="number" placeholder="80" min="0" max="100">
          </div>
        </div>
        <div class="form-row" style="margin-bottom:6px">
          <label class="form-check">
            <input type="checkbox" id="f-featured"> Marquer comme vedette
          </label>
        </div>

        <div style="display:flex;gap:10px;margin-top:16px">
          <button class="btn-full" style="margin-bottom:0" onclick="saveProduct()">
            <span id="save-btn-lbl">Ajouter au catalogue</span>
          </button>
          <button class="btn-ghost-full" style="width:auto;padding:13px 16px" onclick="resetForm()">Effacer</button>
        </div>

        <div class="admin-divider"></div>
        <div class="admin-sec-title">Catalogue actuel</div>
        <div class="prod-admin-list" id="admin-list"></div>

        <button class="btn-ghost-full" onclick="closeAdmin()">Fermer</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>
</div>

<script>
const CATS=['Tout','Dry Sift','Frozen Sift','Static','Beldia','Premium Edition'];
const SORTS=['featured','name','price-asc','price-desc'];
const SORT_LBLS=['Vedettes','A–Z','Prix ↑','Prix ↓'];
const EMOJIS={'Dry Sift':'🌾','Frozen Sift':'❄️','Static':'⚡','Beldia':'🌿','Premium Edition':'💎'};
const BG={'Dry Sift':'linear-gradient(160deg,#1a1206,#0d0d14)','Frozen Sift':'linear-gradient(160deg,#060f1a,#030710)','Static':'linear-gradient(160deg,#1a0a1a,#080610)','Beldia':'linear-gradient(160deg,#0f1a06,#081208)','Premium Edition':'linear-gradient(160deg,#1a1408,#0c0c14)'};

let products=[
  {id:1,name:'Ketama Gold',cat:'Dry Sift',grade:'GOLD',price:120,stock:'in',texture:'Fine Sable',color:'Miel doré',origin:'Rif Oriental, Ketama',terps:['Pin sylvestre','Sous-bois','Miel'],purity:88,arome:82,featured:true},
  {id:2,name:'Frozen Mist',cat:'Frozen Sift',grade:'PLATINUM',price:180,stock:'in',texture:'Cristalline',color:'Blanc givré',origin:'Rif Central, Cryogenic Lab',terps:['Menthe froide','Eucalyptus','Citron'],purity:95,arome:91,featured:true},
  {id:3,name:'Beldia Atlas',cat:'Beldia',grade:'ORIGIN',price:90,stock:'in',texture:'Terreuse compacte',color:'Brun tabac',origin:'Haut Atlas, Heirloom',terps:['Terre humide','Épices','Noix'],purity:72,arome:78,featured:false},
  {id:4,name:'Static Gold',cat:'Static',grade:'ELITE',price:150,stock:'low',texture:'Poudreuse légère',color:'Ambre électrique',origin:'Rif Nord, Electrostatic',terps:['Agrumes','Poivre blanc','Résine'],purity:91,arome:85,featured:true},
  {id:5,name:'Banana OG',cat:'Dry Sift',grade:'GOLD',price:130,stock:'in',texture:'Granuleuse fine',color:'Jaune doré',origin:'Rif Oriental',terps:['Banane','Vanille','Floral'],purity:85,arome:88,featured:false},
  {id:6,name:'Forbidden Fruit',cat:'Premium Edition',grade:'DIAMOND',price:250,stock:'low',texture:'Soyeuse ultra-fine',color:'Pourpre ambré',origin:'Sélection Privée Rif',terps:['Fruit de la passion','Rose','Musc'],purity:97,arome:96,featured:true},
  {id:7,name:'Mimosa',cat:'Dry Sift',grade:'ELITE',price:145,stock:'in',texture:'Poudre satinée',color:'Orange paille',origin:'Rif Occidental',terps:['Orange sanguine','Citron','Fleur'],purity:87,arome:90,featured:false},
  {id:8,name:'Frozen Cream',cat:'Frozen Sift',grade:'PLATINUM',price:190,stock:'in',texture:'Crémeuse dense',color:'Ivoire crème',origin:'Cryo Lab Ketama',terps:['Crème fraîche','Vanille','Boisé doux'],purity:93,arome:92,featured:false},
  {id:9,name:'Zkittlez Frozen',cat:'Frozen Sift',grade:'DIAMOND',price:220,stock:'low',texture:'Cristaux fins',color:'Arc-en-ciel givré',origin:'Rif Premium Cryo',terps:['Fruits rouges','Raisin','Agrumes exotiques'],purity:96,arome:97,featured:true},
  {id:10,name:'Papaya Static',cat:'Static',grade:'ELITE',price:155,stock:'in',texture:'Veloutée',color:'Orange tropical',origin:'Static Lab Rif',terps:['Papaye','Mangue','Épices douces'],purity:89,arome:87,featured:false},
  {id:11,name:'Grape Dry',cat:'Dry Sift',grade:'GOLD',price:125,stock:'out',texture:'Sèche granuleuse',color:'Bordeaux naturel',origin:'Rif Sud',terps:['Raisin noir','Terre','Boisé'],purity:83,arome:80,featured:false},
  {id:12,name:'Black Beldia',cat:'Beldia',grade:'GOLD',price:105,stock:'in',texture:'Compacte noire',color:'Noir profond',origin:'Haut Rif, Ancestral',terps:['Encens','Bois de santal','Terre noire'],purity:76,arome:82,featured:false},
];

let nextId=13,activeCat='Tout',sortIdx=0,detailId=null,editId=null;

function getFiltered(){
  const q=document.getElementById('search-inp')?.value.toLowerCase()||'';
  return products.filter(p=>(activeCat==='Tout'||p.cat===activeCat)&&(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)));
}
function getSorted(arr){
  const s=SORTS[sortIdx];
  if(s==='name') return [...arr].sort((a,b)=>a.name.localeCompare(b.name));
  if(s==='price-asc') return [...arr].sort((a,b)=>a.price-b.price);
  if(s==='price-desc') return [...arr].sort((a,b)=>b.price-a.price);
  return [...arr].sort((a,b)=>(b.featured?1:0)-(a.featured?1:0));
}
function cycleSort(){sortIdx=(sortIdx+1)%SORTS.length;document.getElementById('sort-lbl').textContent=SORT_LBLS[sortIdx];renderGrid()}

function stockDot(s){return `<div class="pc-stk-dot ${s==='in'?'in-stock':s==='low'?'low-stock':'out-stock'}"></div>`}
function stockBadge(s){const m={in:'En stock',low:'Faible',out:'Rupture'};return `<span class="det-stk ${s==='in'?'in':s==='low'?'low':'out'}">${m[s]||'—'}</span>`}

function cardHTML(p){
  return `<div class="pc${p.featured?' featured':''}" onclick="openDetail(${p.id})">
    <div class="pc-vis" style="background:${BG[p.cat]||BG['Beldia']}">
      <span style="position:relative;z-index:1">${EMOJIS[p.cat]||'🌿'}</span>
      <div class="pc-vis-ov"></div>
      <span class="pc-cat">${p.cat}</span>
      ${p.featured?'<span class="pc-feat">✦</span>':''}
      ${stockDot(p.stock)}
      <div class="pc-play"><i class="ti ti-player-play" style="font-size:9px;margin-left:1px"></i></div>
    </div>
    <div class="pc-body">
      <div class="pc-name">${p.name}</div>
      <div class="pc-type">${p.cat} · ${p.origin.split(',')[0]}</div>
      <div class="pc-row"><span class="pc-key">Texture</span><span class="pc-val">${p.texture}</span></div>
      <div class="pc-bar"><div class="pc-fill" style="width:${p.purity}%"></div></div>
      <div class="pc-row"><span class="pc-key">Pureté</span><span class="pc-val">${p.purity}%</span></div>
      <div class="pc-foot">
        <span class="pc-price">${p.price} MAD</span>
        <span class="pc-grade">✦ ${p.grade}</span>
      </div>
    </div>
  </div>`;
}

function renderGrid(){
  const data=getSorted(getFiltered());
  document.getElementById('sort-count').textContent=`${data.length} variété${data.length!==1?'s':''}`;
  document.getElementById('prod-grid').innerHTML=data.map(cardHTML).join('');
}

function renderFilters(){
  document.getElementById('filter-strip').innerHTML=CATS.map(c=>`<div class="fpill${activeCat===c?' on':''}" onclick="setFilter('${c}')">${c}</div>`).join('');
}

function setFilter(c){activeCat=c;renderFilters();renderGrid()}

function renderFeatured(){
  const data=products.filter(p=>p.featured);
  document.getElementById('feat-grid').innerHTML=data.map(cardHTML).join('');
}

function renderStats(){
  const total=products.length;
  const inStock=products.filter(p=>p.stock==='in').length;
  const featured=products.filter(p=>p.featured).length;
  const avgPrice=Math.round(products.reduce((s,p)=>s+p.price,0)/products.length);
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-lbl">Variétés</div><div class="stat-val">${total}</div><div class="stat-sub">↑ Catalogue actif</div></div>
    <div class="stat-card"><div class="stat-lbl">En stock</div><div class="stat-val">${inStock}</div><div class="stat-sub">${total-inStock} hors stock</div></div>
    <div class="stat-card"><div class="stat-lbl">Vedettes</div><div class="stat-val">${featured}</div><div class="stat-sub">Produits mis en avant</div></div>
    <div class="stat-card"><div class="stat-lbl">Prix moy.</div><div class="stat-val">${avgPrice}</div><div class="stat-sub">MAD / gramme</div></div>`;
  const byCat=CATS.slice(1).map(c=>({c,count:products.filter(p=>p.cat===c).length})).sort((a,b)=>b.count-a.count);
  const max=byCat[0]?.count||1;
  document.getElementById('chart-bars').innerHTML=byCat.map(x=>`
    <div class="bar-row">
      <span class="bar-label">${x.c}</span>
      <div class="bar-track"><div class="bar-track-fill" style="width:${Math.round(x.count/max*100)}%"></div></div>
      <span class="bar-num">${x.count}</span>
    </div>`).join('');
}

function renderAdminList(){
  document.getElementById('admin-list').innerHTML=products.map(p=>`
    <div class="pal">
      <span class="pal-emoji">${EMOJIS[p.cat]||'🌿'}</span>
      <div class="pal-info"><div class="pal-name">${p.name}</div><div class="pal-sub">${p.cat} · ${p.price} MAD · ${p.stock==='in'?'✓ Stock':p.stock==='low'?'⚠ Faible':'✗ Rupture'}</div></div>
      <div class="pal-acts">
        <button class="pal-btn" onclick="editProduct(${p.id})" aria-label="Modifier"><i class="ti ti-edit"></i></button>
        <button class="pal-btn del" onclick="deleteProduct(${p.id})" aria-label="Supprimer"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('');
}

function openDetail(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  detailId=id;
  document.getElementById('det-vis').style.background=BG[p.cat]||BG['Beldia'];
  document.getElementById('det-vis').querySelector('span')?.remove();
  const em=document.createElement('span');em.textContent=EMOJIS[p.cat]||'🌿';em.style.cssText='font-size:80px;position:relative;z-index:1';
  document.getElementById('det-vis').prepend(em);
  document.getElementById('det-cat-badge').textContent=p.cat;
  const fb=document.getElementById('det-feat-badge');fb.style.display=p.featured?'inline-flex':'none';
  document.getElementById('det-feat-btn').style.color=p.featured?'var(--gold)':'';
  document.getElementById('det-name').textContent=p.name;
  document.getElementById('det-origin').textContent=p.origin;
  document.getElementById('det-price').textContent=p.price+' MAD / g';
  document.getElementById('det-stk-lbl').outerHTML=`<span class="det-stk ${p.stock==='in'?'in':p.stock==='low'?'low':'out'}" id="det-stk-lbl">${p.stock==='in'?'En stock':p.stock==='low'?'Stock faible':'Rupture'}</span>`;
  document.getElementById('det-spec-grid').innerHTML=[
    ['Texture',p.texture],['Couleur',p.color],['Grade',p.grade],['Terroir',p.origin.split(',')[0]]
  ].map(([k,v])=>`<div class="det-spec"><div class="det-spec-k">${k}</div><div class="det-spec-v">${v}</div></div>`).join('');
  document.getElementById('det-terps').innerHTML=p.terps.map(t=>`<span class="det-terp">${t}</span>`).join('');
  document.getElementById('det-bars').innerHTML=[['Pureté',p.purity],['Arôme',p.arome]].map(([k,v])=>`
    <div class="det-bar-row"><div class="det-bar-hdr"><span class="det-bar-k">${k}</span><span class="det-bar-v">${v}%</span></div>
    <div class="det-bar"><div class="det-bar-f" style="width:${v}%"></div></div></div>`).join('');
  document.getElementById('det-ov').classList.add('open');
}

function closeDetail(){document.getElementById('det-ov').classList.remove('open');detailId=null;}

function toggleFeatured(){
  if(!detailId)return;
  const p=products.find(x=>x.id===detailId);if(!p)return;
  p.featured=!p.featured;
  const fb=document.getElementById('det-feat-badge');fb.style.display=p.featured?'inline-flex':'none';
  document.getElementById('det-feat-btn').style.color=p.featured?'var(--gold)':'';
  renderGrid();renderFeatured();
  toast(p.featured?'✦ Ajouté aux vedettes':'Retiré des vedettes');
}

function openEditFromDetail(){if(detailId){editProduct(detailId);}}

function toggleAdmin(){
  const ov=document.getElementById('admin-ov');
  const isOpen=ov.classList.contains('open');
  if(isOpen){closeAdmin();}else{resetForm();renderAdminList();ov.classList.add('open');document.getElementById('admin-btn').classList.add('active');}
}
function closeAdmin(){document.getElementById('admin-ov').classList.remove('open');document.getElementById('admin-btn').classList.remove('active');editId=null;}
function adminBgClick(e){if(e.target===document.getElementById('admin-ov'))closeAdmin();}

function resetForm(){
  editId=null;
  ['f-name','f-price','f-texture','f-color','f-origin','f-terps','f-purity','f-arome'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
  document.getElementById('f-cat').value='Dry Sift';
  document.getElementById('f-grade').value='ORIGIN';
  document.getElementById('f-stock').value='in';
  document.getElementById('f-featured').checked=false;
  document.getElementById('admin-form-title').textContent='Ajouter un produit';
  document.getElementById('save-btn-lbl').textContent='Ajouter au catalogue';
}

function editProduct(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  editId=id;
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-cat').value=p.cat;
  document.getElementById('f-grade').value=p.grade;
  document.getElementById('f-price').value=p.price;
  document.getElementById('f-stock').value=p.stock;
  document.getElementById('f-texture').value=p.texture;
  document.getElementById('f-color').value=p.color;
  document.getElementById('f-origin').value=p.origin;
  document.getElementById('f-terps').value=p.terps.join(', ');
  document.getElementById('f-purity').value=p.purity;
  document.getElementById('f-arome').value=p.arome;
  document.getElementById('f-featured').checked=p.featured;
  document.getElementById('admin-form-title').textContent='Modifier le produit';
  document.getElementById('save-btn-lbl').textContent='Enregistrer les modifications';
  document.getElementById('admin-ov').scrollTop=0;
  document.querySelector('.admin-sheet').scrollTop=0;
}

function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('⚠ Entrez un nom de variété');return;}
  const price=parseInt(document.getElementById('f-price').value)||100;
  const purity=Math.min(100,Math.max(0,parseInt(document.getElementById('f-purity').value)||80));
  const arome=Math.min(100,Math.max(0,parseInt(document.getElementById('f-arome').value)||80));
  const terps=document.getElementById('f-terps').value.split(',').map(t=>t.trim()).filter(Boolean);

  if(editId){
    const p=products.find(x=>x.id===editId);
    if(p){
      p.name=name;p.cat=document.getElementById('f-cat').value;p.grade=document.getElementById('f-grade').value;
      p.price=price;p.stock=document.getElementById('f-stock').value;
      p.texture=document.getElementById('f-texture').value||'—';p.color=document.getElementById('f-color').value||'—';
      p.origin=document.getElementById('f-origin').value||'Rif, Maroc';
      p.terps=terps.length?terps:['Naturel'];p.purity=purity;p.arome=arome;
      p.featured=document.getElementById('f-featured').checked;
    }
    toast('✓ Produit modifié');
  } else {
    products.push({id:nextId++,name,cat:document.getElementById('f-cat').value,grade:document.getElementById('f-grade').value,price,stock:document.getElementById('f-stock').value,texture:document.getElementById('f-texture').value||'—',color:document.getElementById('f-color').value||'—',origin:document.getElementById('f-origin').value||'Rif, Maroc',terps:terps.length?terps:['Naturel'],purity,arome,featured:document.getElementById('f-featured').checked});
    toast('✦ Produit ajouté au catalogue');
  }
  resetForm();renderGrid();renderAdminList();renderFeatured();renderStats();
}

function deleteProduct(id){
  if(!confirm('Supprimer ce produit ?'))return;
  products=products.filter(p=>p.id!==id);
  renderGrid();renderAdminList();renderFeatured();renderStats();
  toast('Produit supprimé');
}

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// Tab navigation
document.querySelectorAll('.ntab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('p-'+t.dataset.t).classList.add('on');
  if(t.dataset.t==='stats')renderStats();
  if(t.dataset.t==='featured')renderFeatured();
}));
document.querySelectorAll('.ni').forEach(n=>n.addEventListener('click',()=>{
  const t=n.dataset.n;
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  n.classList.add('on');
  const tab=document.querySelector(`.ntab[data-t="${t}"]`);if(tab)tab.classList.add('on');
  document.getElementById('p-'+t).classList.add('on');
  if(t==='stats')renderStats();
  if(t==='featured')renderFeatured();
}));

// Init
renderFilters();renderGrid();
</script>
</body>
</html>
